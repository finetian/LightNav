<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>关于 · LightNav</title>
  <!-- Remix Icon 图标库 -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">
  <!-- 思源字体 (Noto Sans SC) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Comic Neue -->
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- 关于页面样式（同目录） -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="about-card">
    <!-- 头部 -->
    <div class="about-header">
      <div class="brand">LightNav</div>
      <a href="../index.html" class="back-link">
        <i class="ri-arrow-left-line"></i>
        返回主页
      </a>
    </div>

    <!-- 主要内容 -->
    <div class="about-content">
      <!-- 关于项目 -->
      <div class="info-section">
        <div class="section-title">
          <i class="ri-information-line"></i>
          <span>关于项目</span>
        </div>
        <div class="project-desc">
          LightNav 是一个简洁的浏览器起始页。<br>
          项目始于 2026 年 4 月，持续迭代中。
        </div>
      </div>

      <!-- 项目维护者 -->
      <div class="info-section">
        <div class="section-title">
          <i class="ri-user-line"></i>
          <span>项目维护者</span>
        </div>
        <div class="maintainer">
          <div class="maintainer-avatar">
            <img src="profile.png" alt="Fine晴天">
          </div>
          <div class="maintainer-info">
            <div class="maintainer-name">Fine晴天</div>
            <div class="maintainer-link">
              <i class="ri-links-line" style="margin-right: 6px;"></i>
              <a href="https://finetian.top" target="_blank" rel="noopener noreferrer">访问 Fine晴天 の 个人网站</a>
            </div>
          </div>
        </div>
      </div>

      <!-- 资源引用 -->
      <div class="info-section">
        <div class="section-title">
          <i class="ri-heart-line"></i>
          <span>资源引用</span>
        </div>
        <div class="resource-list">
          <div class="resource-item">
            <i class="ri-remixicon-line"></i>
            <span>
              <a href="https://remixicon.com" target="_blank" rel="noopener noreferrer">Remix Icon</a> - 开源图标库
            </span>
          </div>
          <div class="resource-item">
            <i class="ri-font-family"></i>
            <span>
              <a href="https://fonts.google.com" target="_blank" rel="noopener noreferrer">Google Fonts</a> - 思源黑体 / Comic Neue
            </span>
          </div>
          <div class="resource-item">
            <i class="ri-image-line"></i>
            <span>
              <a href="https://www.pexels.com/zh-cn/photo/37078388/" target="_blank" rel="noopener noreferrer">Pexels - 余鑫磊</a> - 背景图片
            </span>
          </div>
        </div>
      </div>

      <!-- 开源声明 -->
      <div class="info-section">
        <div class="section-title">
          <i class="ri-git-branch-line"></i>
          <span>开源声明</span>
        </div>
        <div class="license-content">
          <div class="license-line">
            <i class="ri-checkbox-circle-line" style="margin-right: 8px;"></i>
            本项目根据 <strong>MIT License</strong> 进行开源。
          </div>
          <div class="license-line">
            <i class="ri-file-copy-line" style="margin-right: 8px;"></i>
            <a href="https://github.com/finetian/LightNav/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">点此查看开源协议内容</a>
          </div>
          <div class="license-line" style="margin-top: 4px;">
            <i class="ri-git-repository-line" style="margin-right: 8px;"></i>
            开源地址：
          </div>
          <div class="license-links">
            <a href="https://github.com/finetian/LightNav" target="_blank" rel="noopener noreferrer">
              <i class="ri-github-fill"></i> GitHub
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- 页脚 -->
    <div class="about-footer">
      <div class="footer-line">LightNav v1.0.0</div>
      <div class="footer-line">Made with ❤️ by Fine晴天</div>
    </div>
  </div>
</body>
</html>
